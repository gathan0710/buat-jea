<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.heart{
    position:relative;
    width:500px;
    height:450px;
    animation:pulse 1.5s infinite;
}

.text{
    position:absolute;
    color:#ff3366;
    font-size:14px;
    font-weight:bold;
    text-shadow:0 0 10px #ff3366;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

.falling-heart{
    position:absolute;
    color:red;
    animation:fall linear infinite;
    user-select:none;
}

@keyframes fall{
    from{
        transform:translateY(-100vh);
        opacity:1;
    }
    to{
        transform:translateY(100vh);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="heart" id="heart"></div>

<script>
const heart = document.getElementById("heart");

// Rumus bentuk hati
for(let t=0; t<Math.PI*2; t+=0.15){
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let span = document.createElement("span");
    span.className = "text";
    span.innerText = "I LOVE YOU";
    span.style.left = (x*15 + 230) + "px";
    span.style.top = (y*15 + 200) + "px";

    heart.appendChild(span);
}

// Hati jatuh
function createHeart(){
    const h = document.createElement("div");
    h.className = "falling-heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (15 + Math.random()*25) + "px";
    h.style.animationDuration = (3 + Math.random()*5) + "s";
    document.body.appendChild(h);

    setTimeout(()=>{
        h.remove();
    },8000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
