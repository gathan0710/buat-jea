<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Cinta untuk Jea ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            text-align: center;
            border: 2px solid #ffb3c6;
            max-width: 450px;
            width: 90%;
            z-index: 10;
        }

        h1 { color: #ff477e; margin-bottom: 20px; font-size: 24px; }
        input { width: 100%; padding: 15px; border: 2px solid #ffb3c6; border-radius: 25px; text-align: center; margin-bottom: 20px; font-size: 16px; outline: none; }
        
        #btn-utama { 
            background: #ff477e; color: white; border: none; padding: 15px 30px; 
            border-radius: 25px; cursor: pointer; font-weight: bold; 
            transition: 0.2s ease; font-size: 16px;
        }
        
        .gombalan-box { display: none; }
        .heart { position: absolute; color: #ff7096; font-size: 20px; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 1; } 100% { transform: translateY(110vh); opacity: 360deg; } }
    </style>
</head>
<body>

    <div class="card" id="inputCard">
        <h1 id="soalMtk">Loading...</h1>
        <input type="number" id="jawabanInput" placeholder="Jawaban kamu..." required>
        <button id="btn-utama" onclick="cekJawaban()">Kunci Jawaban 🔒</button>
        <p id="pesanError" style="margin-top: 15px; color: red; font-weight: bold;"></p>
    </div>

    <div class="card gombalan-box" id="gombalanCard">
        <h1>Hai Jea! ✨</h1>
        <p id="teksGombal" style="margin: 20px 0; font-size: 19px; color: #444; font-weight: 500;"></p>
        <button onclick="location.reload()">Main Lagi 🥰</button>
    </div>

    <script>
        // Membuat soal MTK acak
        let angka1 = Math.floor(Math.random() * 10) + 1;
        let angka2 = Math.floor(Math.random() * 10) + 1;
        let hasilBenar = angka1 + angka2;
        
        document.getElementById('soalMtk').innerText = "Berapakah hasil dari: " + angka1 + " + " + angka2 + " ? 🤔";

        const daftarGombal = [
            "Jea, kalo ngobrol smo kmu nih nyambung enak pembawaannyo.",
            "Katanya kalau malam liat bintang itu indah, tapi setelah liat senyum Jea, bintang-bintang di langit langsung minder semua.",
            "Aku tuh gak pernah mau jadi superhero. Aku cuma mau jadi 'super' bagi hari-harimu dan 'hero' di hati Jea.",
            "Yang semangat jea ngerjain excelnyo wkwwk.",
            "Jea itu kayak kopi, manisnya bikin aku candu dan nggak bisa tidur karena selalu kepikiran eahh.",
            "Dunia ini luas banget Jea, idak selalu kito jadi korban dikecewakan terus kito berhak bahagia",
            "Jea, makasih ya udah jadi alasan aku buat senyum setiap hari."
        ];

        function cekJawaban() {
            const jawaban = document.getElementById('jawabanInput').value;
            if (parseInt(jawaban) === hasilBenar) {
                bukaGombalan();
            } else {
                document.getElementById('pesanError').innerText = "Waduh salah! Coba hitung lagi Jea sayang... 😉";
            }
        }

        function bukaGombalan() {
            const gombalanAcak = daftarGombal[Math.floor(Math.random() * daftarGombal.length)];
            document.getElementById('teksGombal').innerText = gombalanAcak;
            document.getElementById('inputCard').style.display = 'none';
            document.getElementById('gombalanCard').style.display = 'block';
        }

        // Efek hujan hati
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
