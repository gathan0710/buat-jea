<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Pesan Buat Kamu! ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            text-align: center;
            border: 2px solid #ffb3c6;
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        /* Tombol Jahil */
        #btn-jahil {
            position: relative;
            transition: 0.2s;
        }

        input { width: 100%; padding: 12px; border: 2px solid #ffb3c6; border-radius: 25px; text-align: center; margin-bottom: 20px; }
        button { background: #ff477e; color: white; border: none; padding: 12px 28px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        .gombalan-box { display: none; }
        .music-control { margin-top: 20px; z-index: 20; }
        .heart { position: absolute; color: #ff7096; font-size: 20px; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 1; } 100% { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="card" id="inputCard">
        <h1>Cobo kmu masukin namo kamu disini? 🤔</h1>
        <input type="text" id="namaInput" placeholder="Ketik nama kamu di sini..." required>
        <button id="btn-jahil" onclick="bukaGombalan()">Sekarang klik cobo! ❤️</button>
    </div>

    <div class="card gombalan-box" id="gombalanCard">
        <h1>Hai <span id="panggilanNama"></span>! ✨</h1>
        <p id="teksGombal" style="margin: 20px 0;"></p>
        <button onclick="lokasiKembali()">Main Lagi 🥰</button>
    </div>

    <div class="music-control">
        <button onclick="playMusic()">Putar Musik 🎵</button>
        <audio id="laguku" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Musik
        function playMusic() {
            const audio = document.getElementById('laguku');
            audio.play();
        }

        // Tombol Jahil (Bergerak jika kursor mendekat)
        const btnJahil = document.getElementById('btn-jahil');
        btnJahil.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - btnJahil.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnJahil.offsetHeight);
            btnJahil.style.position = 'absolute';
            btnJahil.style.left = x + 'px';
            btnJahil.style.top = y + 'px';
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 500);

        function bukaGombalan() {
            const nama = document.getElementById('namaInput').value.trim();
            if (nama === "") { alert("Isi dulu namanya!"); return; }
            
            document.getElementById('panggilanNama').innerText = nama;
            document.getElementById('teksGombal').innerText = "Kamu adalah alasan kenapa hari-hariku jadi lebih indah.";
            document.getElementById('inputCard').style.display = 'none';
            document.getElementById('gombalanCard').style.display = 'block';
        }

        function lokasiKembali() {
            location.reload();
        }
    </script>
</body>
</html>
