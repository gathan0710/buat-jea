<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Jea ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            text-align: center;
            border: 2px solid #ffb3c6;
            max-width: 450px;
            width: 90%;
            z-index: 10;
        }

        h1 { color: #ff477e; margin-bottom: 20px; font-size: 26px; }
        input { width: 100%; padding: 15px; border: 2px solid #ffb3c6; border-radius: 25px; text-align: center; margin-bottom: 20px; font-size: 16px; outline: none; }
        button { background: #ff477e; color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        button:hover { background: #ff0a54; transform: scale(1.05); }
        
        .gombalan-box { display: none; }
        .music-control { margin-top: 20px; z-index: 20; }
        .heart { position: absolute; color: #ff7096; font-size: 20px; pointer-events: none; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 1; } 100% { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="card" id="inputCard">
        <h1>Hai Jea, boleh isi nama panggilan kamu dulu? ❤️</h1>
        <input type="text" id="namaInput" placeholder="Nama panggilan kamu..." required>
        <button onclick="bukaGombalan()">Lihat Pesan untuk Jea</button>
    </div>

    <div class="card gombalan-box" id="gombalanCard">
        <h1>Untuk Jea tersayang ✨</h1>
        <p id="teksGombal" style="margin: 20px 0; font-size: 19px; color: #444; font-weight: 500;"></p>
        <button onclick="lokasiKembali()">Main Lagi 🥰</button>
    </div>

    <div class="music-control">
        <button onclick="playMusic()">Putar Musik 🎵</button>
        <audio id="laguku" loop>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function playMusic() {
            const audio = document.getElementById('laguku');
            audio.play();
        }

        const daftarGombal = [
            "Jea, kamu tahu gak? Sejak ada kamu, duniaku jadi terasa jauh lebih berwarna.",
            "Katanya kalau malam liat bintang itu indah, tapi setelah liat senyum Jea, bintang-bintang di langit langsung minder semua.",
            "Aku tuh gak pernah mau jadi superhero. Aku cuma mau jadi 'super' bagi hari-harimu dan 'hero' di hati Jea.",
            "Tolong jangan sering-sering senyum ya Jea, aku takut gak kuat nanggung rindu yang makin berat ini.",
            "Jea itu kayak kopi, manisnya bikin aku candu dan nggak bisa tidur karena selalu kepikiran.",
            "Dunia ini luas banget Jea, tapi kenapa ya kok pandanganku cuma berhenti di kamu doang?",
            "Jea, makasih ya udah jadi alasan aku buat senyum setiap hari."
        ];

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);

        function bukaGombalan() {
            const nama = document.getElementById('namaInput').value.trim();
            if (nama === "") { alert("Namanya diisi dulu ya Jea..."); return; }
            
            const gombalanAcak = daftarGombal[Math.floor(Math.random() * daftarGombal.length)];
            
            document.getElementById('teksGombal').innerText = gombalanAcak;
            document.getElementById('inputCard').style.display = 'none';
            document.getElementById('gombalanCard').style.display = 'block';
        }

        function lokasiKembali() {
            location.reload();
        }
    </script>
</body>
</html>
